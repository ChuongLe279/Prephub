services:
  db:
    image: mysql:8.0
    container_name: prephub_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./server/db/migration_00001.sql:/docker-entrypoint-initdb.d/002_migration_00001.sql
      - ./server/db/migration_00002.sql:/docker-entrypoint-initdb.d/003_migration_00002.sql
      - ./server/db/migration_00003.sql:/docker-entrypoint-initdb.d/004_migration_00003.sql
      - ./server/db/insert.sql:/docker-entrypoint-initdb.d/900_insert.sql
      
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: prephub_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
